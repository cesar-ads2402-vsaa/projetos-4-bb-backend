spring.application.name=faq

app.frontend.url=https://faq.darkartsbm.com

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update





azure.storage.connection-string=${AZURE_STORAGE_CONNECTION}
azure.storage.container-name=${AZURE_CONTAINER}


spring.servlet.multipart.max-file-size=10MB


spring.servlet.multipart.max-request-size=12MB


api.security.token.secret=${SEC_TOKEN}


spring.mail.host=smtp.titan.email
spring.mail.properties.mail.smtp.from=${MAIL_USERNAME}
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.titan.email
spring.mail.properties.mail.debug=true

spring.mail.properties.mail.smtp.auth.login.disable=false
spring.mail.properties.mail.smtp.auth.plain.disable=false

