name: Java CI with Maven (Backend)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o código do repositório
        uses: actions/checkout@v4

      - name: Configurar o JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Dar permissão de execução ao Maven Wrapper
        run: chmod +x mvnw

      - name: Rodar todos os Testes Automatizados
        run: ./mvnw test
        env:
          AZURE_STORAGE_CONNECTION_STRING: "UseDevelopmentStorage=true"
          API_SECURITY_TOKEN_SECRET: "secret-de-teste-automatizado-12345"
          APP_FRONTEND_URL: "http://localhost:3000"