name: Java CI/CD with Maven, Docker & Azure

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ==========================================
  # FASE 1: TESTES AUTOMATIZADOS
  # ==========================================
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o código do repositório
        uses: actions/checkout@v4

      - name: Configurar o JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Dar permissão de execução ao Maven Wrapper
        run: chmod +x mvnw

      - name: Rodar todos os Testes Automatizados
        run: ./mvnw test
        env:
          AZURE_STORAGE_CONNECTION_STRING: "UseDevelopmentStorage=true"
          API_SECURITY_TOKEN_SECRET: "secret-de-teste-automatizado-12345"
          APP_FRONTEND_URL: "http://localhost:3000"

  # ==========================================
  # FASE 2: DEPLOY (DOCKER HUB + AZURE)
  # ==========================================
  deploy:
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup do Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build e Push da Imagem
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/seu-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/seu-backend:${{ github.sha }}

      - name: Login no Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy no Azure Container Apps
        uses: azure/container-apps-deploy-action@v2
        with:
          resourceGroup: NOME_DO_SEU_RESOURCE_GROUP
          containerAppName: NOME_DO_SEU_CONTAINER_APP
          imageToDeploy: docker.io/${{ secrets.DOCKER_USERNAME }}/seu-backend:latest